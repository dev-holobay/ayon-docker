version: "3.9"

services:
  traefik:
    image: traefik:${TRAEFIK_STACK_SERVER_TAG}
    command:
      # Docker provider
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=ayon-network"
      # HTTP entrypoint
      - "--entrypoints.web.address=:80"
      # Dashboard (LOCAL ONLY!)
      - "--api.dashboard=true"
      - "--api.insecure=true"

    ports:
      - "80:80"
      - "8080:8080" # Traefik Dashboard

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

    networks:
      - ayon-network

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - ayon-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    restart: always
    networks:
      - ayon-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    image: ynput/ayon:${AYON_STACK_SERVER_TAG}
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    environment:
      - AYON_POSTGRES_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
      - AYON_REDIS_URL=redis://redis:6379/0

    volumes:
      - ayon_addons:/addons
      - ayon_storage:/storage

    networks:
      - ayon-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${AYON_STACK_SERVER_PORT}/api/info"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ayon.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.ayon.entrypoints=web"
      - "traefik.http.services.ayon.loadbalancer.server.port=${AYON_STACK_SERVER_PORT}"

  worker:
    image: ynput/ayon-ash:${AYON_STACK_WORKER_TAG}
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy

    environment:
      - AYON_SERVER_URL=http://server:${AYON_STACK_SERVER_PORT}
      - AYON_API_KEY=${AYON_API_KEY}

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"

    networks:
      - ayon-network

networks:
  ayon-network:
    driver: bridge

volumes:
  db_data:
  ayon_addons:
  ayon_storage:
